<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>the rough pages</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f8f1e7;
      font-family: Georgia, serif;
      color: #5f4b4b;
      overflow-x: hidden;
    }
    /* floating stars */
    .star {
      position: fixed;
      color: #d8c3e3;
      animation: float 6s infinite ease-in-out;
      font-size: 20px;
      opacity: 0.7;
      pointer-events: none;
    }
    .star:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; }
    .star:nth-child(2) { top: 30%; left: 80%; animation-delay: 2s; }
    .star:nth-child(3) { top: 70%; left: 10%; animation-delay: 4s; }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    header {
      text-align: center;
      padding: 90px 20px 50px;
    }
    h1 {
      font-size: 72px;
      color: #c89fa3;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .subtitle {
      color: #8b6f8e;
      font-style: italic;
      font-size: 20px;
    }
    .quote {
      margin-top: 35px;
      color: #7b5e57;
      font-size: 26px;
    }

    .section {
      width: 85%;
      max-width: 1400px;
      margin: auto;
      margin-top: 50px;
      margin-bottom: 70px;
    }
    .section-title {
      font-size: 55px;
      color: #9b7e8d;
      margin-bottom: 25px;
    }

    /* Compact Card Styles */
    .reading-card {
      background: #fffaf5;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      margin-bottom: 20px;
      transition: 0.3s ease;
      max-width: 600px; 
    }
    .reading-card:hover {
      transform: translateY(-4px);
    }
    .book-title {
      font-size: 28px; 
      color: #7b5e57;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .book-author {
      color: #9d8b8b;
      font-size: 18px; 
      margin-bottom: 15px;
    }
    .review {
      font-size: 19px; 
      line-height: 1.6;
    }
    .reviewer-tag {
      margin-top: 15px;
      color: #9d8b8b;
      font-style: italic;
      font-size: 16px;
    }

    .submit-button {
      display: inline-block;
      margin-top: 10px;
      margin-bottom: 40px;
      padding: 14px 24px;
      background-color: #c89fa3;
      color: white;
      text-decoration: none;
      border-radius: 18px;
      font-size: 18px;
      transition: 0.3s ease;
    }
    .submit-button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .two-column-section {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }
    .left-column { flex: 1.4; }
    .right-column {
      flex: 1.1;
      position: sticky;
      top: 40px;
    }

    .mission-text { font-size: 22px; line-height: 1.9; margin-bottom: 25px; }
    .mission-subtext { font-size: 20px; line-height: 1.8; color: #8b6f8e; }

    @media (max-width: 900px) {
      .two-column-section { flex-direction: column; }
      .right-column { position: static; width: 100%; }
    }

    /* Top Books Section */
    .top-books-section { margin-top: 60px; }
    .mini-title { font-size: 38px; color: #9b7e8d; margin-bottom: 25px; }
    .book-grid { display: flex; gap: 22px; flex-wrap: wrap; }
    .top-book-card {
      background: #fffaf5;
      border-radius: 24px;
      padding: 20px;
      width: 180px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .top-book-image { width: 100%; border-radius: 16px; margin-bottom: 15px; }
    .top-book-name { color: #7b5e57; font-size: 24px; font-weight: bold; }
